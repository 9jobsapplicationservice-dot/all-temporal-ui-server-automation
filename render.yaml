services:
  - type: web
    name: rocketflow-saas
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PIPELINE_WORKSPACE_ROOT
        value: /app
      - key: PIPELINE_ROOT
        value: /data/pipeline
      - key: PIPELINE_PYTHON
        value: python3
      - key: PIPELINE_TEMPORAL_AUTO_START
        value: "true"
      - key: PIPELINE_RUN_ONCE_ALWAYS_FRESH
        value: "true"
      - key: PIPELINE_LINKEDIN_USERNAME
        sync: false
      - key: PIPELINE_LINKEDIN_PASSWORD
        sync: false
      - key: ROCKETREACH_API_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: PIPELINE_LINKEDIN_AUTO_LOGIN
        value: "true"
      - key: PIPELINE_LINKEDIN_SAFE_MODE
        value: "true"
